<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Qcard PRO</title>
    <!-- Memberstack webflow package -->
　　<script data-memberstack-app="app_cmo5kpn5z001t0sua7tkudlyn" src="https://static.memberstack.com/scripts/v2/memberstack.js" type="text/javascript"></script>
    <style>
        :root {
            --bg: #0f1117;
            --surface: #1a1d27;
            --surface2: #22263a;
            --border: #2e3350;
            --accent: #4f7cff;
            --accent2: #7c5fff;
            --text: #e8eaf6;
            --text-muted: #6b7280;
            --success: #34d399;
            --warning: #fbbf24;
            --danger: #f87171;
        }

        :root.light {
            --bg: #f3f4f6;
            --surface: #ffffff;
            --surface2: #f9fafb;
            --border: #d1d5db;
            --accent: #2563eb;
            --accent2: #7c3aed;
            --text: #111827;
            --text-muted: #6b7280;
            --success: #059669;
            --warning: #d97706;
            --danger: #dc2626;
        }

        .theme-toggle {
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 3px 10px;
            cursor: pointer;
            font-size: 0.75rem;
            color: var(--text-muted);
            display: flex;
            align-items: center;
            gap: 5px;
            transition: all 0.15s;
            white-space: nowrap;
            user-select: none;
        }
        .theme-toggle:hover { border-color: var(--accent); color: var(--accent); }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Helvetica Neue', 'Hiragino Sans', Meiryo, sans-serif;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* ======= TOP BAR ======= */
        .top-bar {
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            padding: 8px 14px;
            display: flex;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
            z-index: 100;
            flex-shrink: 0;
        }

        .app-logo {
            font-size: 0.85rem;
            font-weight: 800;
            letter-spacing: 0.05em;
            background: linear-gradient(135deg, var(--accent), var(--accent2));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            white-space: nowrap;
        }

        .divider { width: 1px; height: 24px; background: var(--border); flex-shrink: 0; }

        .ctrl-group {
            display: flex;
            align-items: center;
            gap: 7px;
            font-size: 0.72rem;
            color: var(--text-muted);
        }

        .ctrl-group label { white-space: nowrap; }

        input[type="number"].num {
            width: 42px;
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 5px;
            color: var(--text);
            text-align: center;
            padding: 3px 2px;
            font-size: 0.75rem;
        }

        input[type="range"] {
            width: 70px;
            accent-color: var(--accent);
            cursor: pointer;
        }

        .val-badge {
            font-size: 0.7rem;
            color: var(--accent);
            font-weight: 700;
            min-width: 30px;
        }

        .top-btn {
            background: var(--surface2);
            border: 1px solid var(--border);
            color: var(--text-muted);
            padding: 4px 10px;
            border-radius: 5px;
            font-size: 0.72rem;
            cursor: pointer;
            transition: all 0.15s;
            white-space: nowrap;
        }
        .top-btn:hover { background: var(--border); color: var(--text); }
        .top-btn.danger:hover { background: #7f1d1d; border-color: var(--danger); color: var(--danger); }

        /* ======= SCENARIO BAR ======= */
        .scenario-bar {
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            padding: 6px 14px;
            display: flex;
            align-items: center;
            gap: 10px;
            flex-shrink: 0;
        }

        #scenario-tabs {
            display: flex;
            flex-wrap: wrap;
            gap: 4px;
        }

        .scenario-bar-label {
            font-size: 0.68rem;
            color: var(--text-muted);
            white-space: nowrap;
            font-weight: 600;
            letter-spacing: 0.05em;
        }

        .scenario-tab {
            position: relative;
            display: flex;
            align-items: center;
            gap: 5px;
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 4px 10px 4px 8px;
            cursor: pointer;
            transition: all 0.15s;
            flex-shrink: 0;
            min-width: 90px;
        }

        .scenario-tab.active {
            border-color: var(--accent);
            background: rgba(79,124,255,0.12);
        }

        .scenario-tab:hover:not(.active) {
            border-color: #4b5563;
            background: var(--border);
        }

        .scenario-tab .tab-key {
            font-size: 0.58rem;
            background: var(--border);
            border-radius: 3px;
            padding: 1px 4px;
            color: var(--accent);
            font-weight: 700;
            flex-shrink: 0;
        }

        .scenario-tab.active .tab-key {
            background: var(--accent);
            color: white;
        }

        .scenario-tab .tab-name {
            font-size: 0.73rem;
            color: var(--text);
            flex: 1;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            background: transparent;
            border: none;
            outline: none;
            cursor: pointer;
            pointer-events: none;
            min-width: 0;
        }
        .scenario-tab.active .tab-name {
            pointer-events: auto;
            cursor: text;
            border-bottom: 1px solid var(--border);
        }
        .scenario-tab.active .tab-name:focus {
            border-bottom-color: var(--accent);
        }

        .scenario-tab .tab-delete {
            background: none;
            border: none;
            font-size: 0.8rem;
            color: var(--text-muted);
            cursor: pointer;
            line-height: 1;
            padding: 0 2px;
            flex-shrink: 0;
            border-radius: 3px;
            transition: color 0.15s, background 0.15s;
        }
        .scenario-tab .tab-delete:hover { color: var(--danger); background: rgba(248,113,113,0.1); }

        .scenario-add-btn {
            background: transparent;
            border: 1px dashed var(--border);
            color: var(--text-muted);
            border-radius: 6px;
            padding: 4px 10px;
            font-size: 0.75rem;
            cursor: pointer;
            white-space: nowrap;
            transition: all 0.15s;
            flex-shrink: 0;
        }
        .scenario-add-btn:hover { border-color: var(--accent); color: var(--accent); }

        /* ======= GRID ======= */
        .grid-wrapper {
            flex: 1;
            overflow: auto;
            padding: 12px;
        }

        .grid-container {
            display: grid;
            gap: 8px;
            height: 100%;
            transition: opacity 0.3s ease;
        }

        .grid-container.dimmed { opacity: 0.15; pointer-events: none; }

        .grid-item {
            background: var(--surface);
            border: 1.5px solid var(--border);
            border-radius: 8px;
            padding: 8px 10px;
            display: flex;
            flex-direction: column;
            cursor: default;
            overflow: hidden;
            position: relative;
            transition: border-color 0.15s, box-shadow 0.15s;
            min-height: 70px;
        }

        .grid-item:hover { border-color: var(--accent); box-shadow: 0 0 0 1px rgba(79,124,255,0.2); }

        .grid-item.shortcut-active {
            border-color: var(--success);
            box-shadow: 0 0 0 2px rgba(52,211,153,0.3);
        }

        .grid-item.dragging { opacity: 0.4; transform: scale(0.96); border-style: dashed; }

        .drag-handle {
            position: absolute;
            top: 5px;
            right: 6px;
            color: var(--border);
            font-size: 1rem;
            cursor: grab;
            user-select: none;
            z-index: 10;
            transition: color 0.15s;
        }
        .drag-handle:hover { color: var(--accent); }

        .item-meta {
            display: flex;
            align-items: center;
            gap: 5px;
            margin-bottom: 3px;
        }

        .item-num {
            font-size: 0.58rem;
            color: var(--text-muted);
        }

        .shortcut-badge {
            font-size: 0.58rem;
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 3px;
            padding: 1px 5px;
            color: var(--accent);
            font-weight: 700;
            letter-spacing: 0.05em;
        }

        .title-input {
            width: calc(100% - 22px);
            border: none;
            outline: none;
            font-size: 0.8rem;
            font-weight: 700;
            color: #93c5fd;
            background: transparent;
            margin-bottom: 4px;
            padding-bottom: 3px;
            border-bottom: 1px solid var(--border);
        }

        .title-input::placeholder { color: var(--border); }

        .content-textarea {
            width: 100%;
            flex: 1;
            border: none;
            resize: none;
            outline: none;
            font-size: 0.75rem;
            color: #9ca3af;
            background: transparent;
            line-height: 1.5;
        }

        .content-textarea::placeholder { color: #374151; }

        /* ======= OVERLAY ======= */
        #overlay-backdrop {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.6);
            display: none;
            z-index: 400;
            backdrop-filter: blur(2px);
        }

        #overlay {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 85%;
            height: 55%;
            background: var(--surface);
            border: 2px solid var(--accent);
            border-radius: 16px;
            padding: 28px 36px;
            box-shadow: 0 25px 60px rgba(0,0,0,0.7), 0 0 40px rgba(79,124,255,0.15);
            display: none;
            z-index: 500;
            overflow-y: auto;
            cursor: default;
        }

        #overlay-drag-handle {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 36px;
            cursor: move;
            z-index: 5;
            border-radius: 16px 16px 0 0;
        }

        #overlay-drag-handle::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 36px;
            height: 4px;
            background: var(--border);
            border-radius: 2px;
        }

        #overlay::-webkit-scrollbar { width: 8px; }
        #overlay::-webkit-scrollbar-track { background: var(--surface2); border-radius: 4px; }
        #overlay::-webkit-scrollbar-thumb { background: var(--accent); border-radius: 4px; }

        #overlay-title {
            font-size: 0.9rem;
            font-weight: 800;
            color: var(--accent);
            letter-spacing: 0.04em;
            margin-bottom: 16px;
            padding-bottom: 10px;
            border-bottom: 1px solid var(--border);
        }

        #overlay-text {
            font-weight: 700;
            color: var(--text);
            line-height: 1.6;
            white-space: pre-wrap;
            word-wrap: break-word;
            padding-bottom: 60px;
        }

        #edit-mode-btn {
            position: absolute;
            top: 14px;
            right: 50px;
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 6px;
            font-size: 0.85rem;
            width: 30px;
            height: 28px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.15s;
            z-index: 10;
            line-height: 1;
        }
        #edit-mode-btn:hover { border-color: var(--accent); }
        #edit-mode-btn.active {
            background: rgba(79,124,255,0.15);
            border-color: var(--accent);
        }

        #overlay-edit {
            display: none;
            width: 100%;
            flex: 1;
            border: 1px solid var(--border);
            border-radius: 8px;
            background: var(--surface2);
            color: var(--text);
            font-size: inherit;
            font-weight: 700;
            line-height: 1.6;
            padding: 12px 14px;
            resize: none;
            outline: none;
            box-sizing: border-box;
            margin-bottom: 8px;
            min-height: 120px;
        }
        #overlay-edit:focus { border-color: var(--accent); }

        #overlay-title-edit {
            display: none;
            width: 100%;
            border: 1px solid var(--border);
            border-radius: 6px;
            background: var(--surface2);
            color: var(--accent);
            font-size: 0.9rem;
            font-weight: 800;
            letter-spacing: 0.04em;
            padding: 6px 10px;
            outline: none;
            box-sizing: border-box;
            margin-bottom: 8px;
        }
        #overlay-title-edit:focus { border-color: var(--accent); }

        #overlay.edit-mode #overlay-title   { display: none; }
        #overlay.edit-mode #overlay-title-edit { display: block; }
        #overlay.edit-mode #overlay-text    { display: none; }
        #overlay.edit-mode #overlay-edit    { display: block; }
        #overlay.edit-mode #speech-bar      { display: none; }

        #speech-bar {
            position: sticky;
            bottom: 0;
            left: 0;
            right: 0;
            background: var(--surface);
            border-top: 1px solid var(--border);
            padding: 8px 0 4px;
            display: flex;
            align-items: center;
            gap: 6px;
            margin-top: 16px;
        }

        .speech-btn {
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 6px;
            color: var(--text);
            font-size: 0.85rem;
            width: 34px;
            height: 30px;
            cursor: pointer;
            transition: all 0.15s;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }
        .speech-btn:hover:not(:disabled) { border-color: var(--accent); color: var(--accent); }
        .speech-btn:disabled { opacity: 0.3; cursor: default; }
        .speech-btn#speech-play-btn.speaking { border-color: var(--success); color: var(--success); }

        #speech-status {
            flex: 1;
            font-size: 0.65rem;
            color: var(--text-muted);
            letter-spacing: 0.04em;
        }

        #speech-rate {
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 5px;
            color: var(--text);
            font-size: 0.68rem;
            padding: 2px 4px;
            cursor: pointer;
            outline: none;
        }

        #close-btn {
            position: absolute;
            top: 14px;
            right: 18px;
            font-size: 1.4rem;
            cursor: pointer;
            color: var(--text-muted);
            z-index: 600;
            line-height: 1;
            transition: color 0.15s;
        }
        #close-btn:hover { color: var(--danger); }

        /* ======= SHORTCUT TOAST ======= */
        #shortcut-toast {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: var(--surface);
            border: 1px solid var(--success);
            border-radius: 8px;
            padding: 8px 14px;
            font-size: 0.75rem;
            color: var(--success);
            font-weight: 600;
            z-index: 800;
            opacity: 0;
            transform: translateY(8px);
            transition: opacity 0.2s, transform 0.2s;
            pointer-events: none;
        }
        #shortcut-toast.show { opacity: 1; transform: translateY(0); }

        /* ======= SHORTCUT HINT BAR ======= */
        .hint-bar {
            background: var(--surface);
            border-top: 1px solid var(--border);
            padding: 4px 14px;
            display: flex;
            gap: 16px;
            flex-wrap: wrap;
            flex-shrink: 0;
        }

        .hint-item {
            display: flex;
            align-items: center;
            gap: 4px;
            font-size: 0.63rem;
            color: var(--text-muted);
        }

        kbd {
            display: inline-block;
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 3px;
            padding: 1px 5px;
            font-size: 0.62rem;
            color: var(--accent);
            font-family: monospace;
            font-weight: 700;
        }

        /* ======= SCENARIO COUNT BADGE ======= */
        .scenario-count {
            font-size: 0.62rem;
            background: rgba(79,124,255,0.15);
            border: 1px solid rgba(79,124,255,0.3);
            border-radius: 10px;
            padding: 1px 6px;
            color: var(--accent);
            margin-left: 2px;
        }
    

.modal-btn {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-size: 0.78rem;
    font-weight: 600;
    padding: 9px 8px;
    cursor: pointer;
    transition: all 0.15s;
}
.modal-btn:hover { border-color: var(--accent); color: var(--accent); background: rgba(79,124,255,0.08); }
.modal-btn-icon { font-size: 0.9rem; color: var(--accent); }


#timer-widget {
    position: fixed;
    bottom: 50px;
    right: 20px;
    width: 180px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.4);
    z-index: 700;
    overflow: hidden;
    user-select: none;
    transition: box-shadow 0.2s;
}
#timer-widget.minimized #timer-body { display: none; }
#timer-widget.minimized { width: auto; }
#timer-header {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 7px 10px;
    background: var(--surface2);
    border-bottom: 1px solid var(--border);
    cursor: move;
    font-size: 0.72rem;
    color: var(--text-muted);
}
#timer-drag-handle { font-size: 0.9rem; cursor: move; }
#timer-label { flex: 1; font-weight: 600; letter-spacing: 0.04em; }
#timer-minimize-btn {
    cursor: pointer;
    font-size: 1rem;
    line-height: 1;
    padding: 0 2px;
    transition: color 0.15s;
}
#timer-minimize-btn:hover { color: var(--accent); }
#timer-body { padding: 12px 10px 10px; }
#timer-display {
    font-size: 2.4rem;
    font-weight: 900;
    text-align: center;
    color: var(--text);
    letter-spacing: 0.04em;
    font-variant-numeric: tabular-nums;
    line-height: 1;
    margin-bottom: 10px;
    transition: color 0.3s;
}
#timer-display.warning { color: var(--warning); }
#timer-display.danger  { color: var(--danger); animation: blink 0.6s step-end infinite; }
#timer-display.done    { color: var(--danger); }
@keyframes blink {
    0%, 100% { opacity: 1; }
    50%       { opacity: 0.2; }
}
#timer-presets {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 4px;
    margin-bottom: 8px;
}
.t-preset {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 5px;
    color: var(--text-muted);
    font-size: 0.7rem;
    padding: 4px 2px;
    cursor: pointer;
    transition: all 0.15s;
}
.t-preset:hover    { border-color: var(--accent); color: var(--accent); }
.t-preset.selected { border-color: var(--accent); background: rgba(79,124,255,0.12); color: var(--accent); font-weight: 700; }
#timer-controls { display: flex; gap: 6px; }
#timer-start-btn {
    flex: 1;
    background: var(--accent);
    border: none;
    border-radius: 6px;
    color: white;
    font-size: 0.75rem;
    font-weight: 700;
    padding: 6px 4px;
    cursor: pointer;
    transition: opacity 0.15s;
    letter-spacing: 0.03em;
}
#timer-start-btn:hover { opacity: 0.85; }
#timer-start-btn.running { background: var(--warning); color: #1f2937; }
#timer-reset-btn {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text-muted);
    font-size: 1rem;
    width: 32px;
    cursor: pointer;
    transition: all 0.15s;
}
#timer-reset-btn:hover { border-color: var(--danger); color: var(--danger); }
#timer-flash {
    position: fixed;
    inset: 0;
    background: rgba(248,113,113,0.18);
    z-index: 900;
    pointer-events: none;
    opacity: 0;
}
#timer-flash.flash { animation: flashAnim 1.4s ease-out forwards; }
@keyframes flashAnim {
    0%   { opacity: 1; }
    100% { opacity: 0; }
}
</style>
</head>
<body>
<!-- TOP BAR -->
<div class="top-bar">
    <div class="app-logo">Qcard PRO</div>
    <div class="divider"></div>

    <div class="ctrl-group">
        <label>グリッド</label>
        <input type="number" id="rowsInput" min="1" max="10" value="4" class="num">
        <span style="color:var(--text-muted)">×</span>
        <input type="number" id="colsInput" min="1" max="10" value="4" class="num">
    </div>

    <div class="divider"></div>

    <div class="ctrl-group">
        <label>文字</label>
        <input type="range" id="fontSizeSlider" min="10" max="100" value="30">
        <input type="number" id="fontSizeNum" min="10" max="150" value="30" class="num">
        <span>px</span>
    </div>

    <div class="divider"></div>

    <div class="ctrl-group">
        <label>幅</label>
        <input type="range" id="widthSlider" min="20" max="98" value="85">
        <span class="val-badge" id="widthDisplay">85%</span>
    </div>

    <div class="ctrl-group">
        <label>高さ</label>
        <input type="range" id="heightSlider" min="20" max="95" value="55">
        <span class="val-badge" id="heightDisplay">55%</span>
    </div>

    <div class="divider"></div>
    <div class="theme-toggle" id="themeToggle" onclick="toggleTheme()">
        <span id="themeIcon">☀️</span>
        <span id="themeLabel">ライト</span>
    </div>
    <div class="top-btn danger" onclick="clearAll()">全消去</div>
    <div class="top-btn" onclick="openDataModal()">データ管理</div>
</div>

<!-- SCENARIO BAR -->
<div class="scenario-bar">
    <span class="scenario-bar-label">シナリオ</span>
    <div id="scenario-tabs"></div>
    <button class="scenario-add-btn" id="scenario-add-btn" onclick="addScenario()">＋ 追加</button>
</div>

<!-- GRID -->
<div class="grid-wrapper">
    <div class="grid-container" id="grid"></div>
</div>

<!-- HINT BAR -->
<div class="hint-bar">
    <div class="hint-item"><kbd>1</kbd>〜<kbd>9</kbd> <span>カード呼び出し</span></div>
    <div class="hint-item"><kbd>0</kbd> <span>閉じる</span></div>
    <div class="hint-item"><kbd>Esc</kbd> <span>閉じる</span></div>
    <div class="hint-item"><kbd>F1</kbd>〜<kbd>F8</kbd> <span>シナリオ切替</span></div>
    <div class="hint-item"><kbd>↑</kbd><kbd>↓</kbd> <span>スクロール</span></div>
    <div class="hint-item">ホバー <span>プレビュー</span></div>
    <div class="hint-item">クリック <span>固定表示</span></div>
</div>

<!-- OVERLAY -->
<div id="overlay-backdrop" onclick="handleBackdropClick()"></div>
<div id="overlay">
    <div id="overlay-drag-handle"></div>
    <span id="close-btn" onclick="hideOverlay()">×</span>
    <button id="edit-mode-btn" onclick="toggleEditMode()" title="編集モード">✏️</button>
    <div id="overlay-title"></div>
    <div id="overlay-text"></div>
    <input type="text" id="overlay-title-edit" placeholder="タイトルを編集...">
    <textarea id="overlay-edit" placeholder="内容を編集..."></textarea>
    <div id="speech-bar">
        <button class="speech-btn" id="speech-play-btn"  onclick="speechPlay()"  title="再生">▶</button>
        <button class="speech-btn" id="speech-pause-btn" onclick="speechPause()" title="一時停止" disabled>⏸</button>
        <button class="speech-btn" id="speech-stop-btn"  onclick="speechStop()"  title="停止" disabled>■</button>
        <div id="speech-status"></div>
        <select id="speech-rate" onchange="speechUpdateRate()" title="読み上げ速度">
            <option value="0.6">0.6x</option>
            <option value="0.8">0.8x</option>
            <option value="1.0" selected>1.0x</option>
            <option value="1.2">1.2x</option>
            <option value="1.5">1.5x</option>
            <option value="1.7">1.7x</option>
            <option value="2.0">2.0x</option>
        </select>
    </div>
</div>

<!-- DATA MODAL -->
<div id="data-modal-backdrop" onclick="closeDataModal()" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.55);z-index:1000;backdrop-filter:blur(2px);"></div>
<div id="data-modal" style="display:none;position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);z-index:1001;width:340px;background:var(--surface);border:1px solid var(--border);border-radius:14px;box-shadow:0 20px 60px rgba(0,0,0,0.5);overflow:hidden;">
    <div style="padding:16px 18px 12px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;">
        <span style="font-size:0.85rem;font-weight:800;color:var(--text);letter-spacing:0.04em;">データ管理</span>
        <span onclick="closeDataModal()" style="cursor:pointer;color:var(--text-muted);font-size:1.2rem;line-height:1;padding:2px 4px;transition:color 0.15s;" onmouseover="this.style.color='var(--danger)'" onmouseout="this.style.color='var(--text-muted)'">×</span>
    </div>
    <div style="padding:16px 18px;">

        <!-- エクスポート -->
        <div style="margin-bottom:18px;">
            <div style="font-size:0.7rem;font-weight:700;color:var(--text-muted);letter-spacing:0.08em;text-transform:uppercase;margin-bottom:8px;">エクスポート</div>
            <div style="display:flex;gap:8px;">
                <button class="modal-btn" onclick="exportJSON()">
                    <span class="modal-btn-icon">{ }</span>
                    <span>JSON</span>
                </button>
                <button class="modal-btn" onclick="exportCSV()">
                    <span class="modal-btn-icon">⊞</span>
                    <span>CSV</span>
                </button>
            </div>
            <div style="font-size:0.68rem;color:var(--text-muted);margin-top:7px;line-height:1.6;">
                JSON：全シナリオを完全保存（推奨）<br>
                CSV：表計算ソフトで編集可能
            </div>
        </div>

        <!-- インポート -->
        <div style="border-top:1px solid var(--border);padding-top:16px;">
            <div style="font-size:0.7rem;font-weight:700;color:var(--text-muted);letter-spacing:0.08em;text-transform:uppercase;margin-bottom:8px;">インポート</div>
            <div style="display:flex;gap:8px;">
                <button class="modal-btn" onclick="document.getElementById('importFileJSON').click()">
                    <span class="modal-btn-icon">{ }</span>
                    <span>JSON</span>
                </button>
                <button class="modal-btn" onclick="document.getElementById('importFileCSV').click()">
                    <span class="modal-btn-icon">⊞</span>
                    <span>CSV</span>
                </button>
            </div>
            <div style="font-size:0.68rem;color:var(--text-muted);margin-top:7px;line-height:1.6;">
                ⚠️ 現在のデータは上書きされます
            </div>
            <input type="file" id="importFileJSON" accept=".json" style="display:none" onchange="importJSON(event)">
            <input type="file" id="importFileCSV"  accept=".csv"  style="display:none" onchange="importCSV(event)">
        </div>

    </div>
</div>



<!-- TOAST -->
<div id="shortcut-toast"></div>

<!-- TIMER WIDGET -->
<div id="timer-widget">
    <div id="timer-header">
        <span id="timer-drag-handle">⠿</span>
        <span id="timer-label">タイマー</span>
        <span id="timer-minimize-btn" onclick="toggleTimerMinimize()">─</span>
    </div>
    <div id="timer-body">
        <div id="timer-display">0:00</div>
        <div id="timer-presets">
            <button class="t-preset" data-secs="30" onclick="setTimer(30)">30秒</button>
            <button class="t-preset" data-secs="60" onclick="setTimer(60)">1分</button>
            <button class="t-preset" data-secs="120" onclick="setTimer(120)">2分</button>
            <button class="t-preset" data-secs="180" onclick="setTimer(180)">3分</button>
        </div>
        <div id="timer-controls">
            <button id="timer-start-btn" onclick="timerStartStop()">▶ スタート</button>
            <button id="timer-reset-btn" onclick="timerReset()">↺</button>
        </div>
    </div>
</div>

<!-- TIMER FLASH OVERLAY -->
<div id="timer-flash"></div>
<script src="app.min.js"></script>
</body>
</html>
