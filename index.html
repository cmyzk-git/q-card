<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Qcard PRO</title>
    <style>
        :root {
            --bg: #0f1117;
            --surface: #1a1d27;
            --surface2: #22263a;
            --border: #2e3350;
            --accent: #4f7cff;
            --accent2: #7c5fff;
            --text: #e8eaf6;
            --text-muted: #6b7280;
            --success: #34d399;
            --warning: #fbbf24;
            --danger: #f87171;
        }

        :root.light {
            --bg: #f3f4f6;
            --surface: #ffffff;
            --surface2: #f9fafb;
            --border: #d1d5db;
            --accent: #2563eb;
            --accent2: #7c3aed;
            --text: #111827;
            --text-muted: #6b7280;
            --success: #059669;
            --warning: #d97706;
            --danger: #dc2626;
        }

        .theme-toggle {
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 3px 10px;
            cursor: pointer;
            font-size: 0.75rem;
            color: var(--text-muted);
            display: flex;
            align-items: center;
            gap: 5px;
            transition: all 0.15s;
            white-space: nowrap;
            user-select: none;
        }
        .theme-toggle:hover { border-color: var(--accent); color: var(--accent); }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Helvetica Neue', 'Hiragino Sans', Meiryo, sans-serif;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* ======= TOP BAR ======= */
        .top-bar {
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            padding: 8px 14px;
            display: flex;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
            z-index: 100;
            flex-shrink: 0;
        }

        .app-logo {
            font-size: 0.85rem;
            font-weight: 800;
            letter-spacing: 0.05em;
            background: linear-gradient(135deg, var(--accent), var(--accent2));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            white-space: nowrap;
        }

        .divider { width: 1px; height: 24px; background: var(--border); flex-shrink: 0; }

        .ctrl-group {
            display: flex;
            align-items: center;
            gap: 7px;
            font-size: 0.72rem;
            color: var(--text-muted);
        }

        .ctrl-group label { white-space: nowrap; }

        input[type="number"].num {
            width: 42px;
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 5px;
            color: var(--text);
            text-align: center;
            padding: 3px 2px;
            font-size: 0.75rem;
        }

        input[type="range"] {
            width: 70px;
            accent-color: var(--accent);
            cursor: pointer;
        }

        .val-badge {
            font-size: 0.7rem;
            color: var(--accent);
            font-weight: 700;
            min-width: 30px;
        }

        .top-btn {
            background: var(--surface2);
            border: 1px solid var(--border);
            color: var(--text-muted);
            padding: 4px 10px;
            border-radius: 5px;
            font-size: 0.72rem;
            cursor: pointer;
            transition: all 0.15s;
            white-space: nowrap;
        }
        .top-btn:hover { background: var(--border); color: var(--text); }
        .top-btn.danger:hover { background: #7f1d1d; border-color: var(--danger); color: var(--danger); }

        /* ======= SCENARIO BAR ======= */
        .scenario-bar {
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            padding: 6px 14px;
            display: flex;
            align-items: center;
            gap: 10px;
            flex-shrink: 0;
        }

        #scenario-tabs {
            display: flex;
            flex-wrap: wrap;
            gap: 4px;
        }

        .scenario-bar-label {
            font-size: 0.68rem;
            color: var(--text-muted);
            white-space: nowrap;
            font-weight: 600;
            letter-spacing: 0.05em;
        }

        .scenario-tab {
            position: relative;
            display: flex;
            align-items: center;
            gap: 5px;
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 4px 10px 4px 8px;
            cursor: pointer;
            transition: all 0.15s;
            flex-shrink: 0;
            min-width: 90px;
        }

        .scenario-tab.active {
            border-color: var(--accent);
            background: rgba(79,124,255,0.12);
        }

        .scenario-tab:hover:not(.active) {
            border-color: #4b5563;
            background: var(--border);
        }

        .scenario-tab .tab-key {
            font-size: 0.58rem;
            background: var(--border);
            border-radius: 3px;
            padding: 1px 4px;
            color: var(--accent);
            font-weight: 700;
            flex-shrink: 0;
        }

        .scenario-tab.active .tab-key {
            background: var(--accent);
            color: white;
        }

        .scenario-tab .tab-name {
            font-size: 0.73rem;
            color: var(--text);
            flex: 1;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            background: transparent;
            border: none;
            outline: none;
            cursor: pointer;
            pointer-events: none;
            min-width: 0;
        }
        .scenario-tab.active .tab-name {
            pointer-events: auto;
            cursor: text;
            border-bottom: 1px solid var(--border);
        }
        .scenario-tab.active .tab-name:focus {
            border-bottom-color: var(--accent);
        }

        .scenario-tab .tab-delete {
            background: none;
            border: none;
            font-size: 0.8rem;
            color: var(--text-muted);
            cursor: pointer;
            line-height: 1;
            padding: 0 2px;
            flex-shrink: 0;
            border-radius: 3px;
            transition: color 0.15s, background 0.15s;
        }
        .scenario-tab .tab-delete:hover { color: var(--danger); background: rgba(248,113,113,0.1); }

        .scenario-add-btn {
            background: transparent;
            border: 1px dashed var(--border);
            color: var(--text-muted);
            border-radius: 6px;
            padding: 4px 10px;
            font-size: 0.75rem;
            cursor: pointer;
            white-space: nowrap;
            transition: all 0.15s;
            flex-shrink: 0;
        }
        .scenario-add-btn:hover { border-color: var(--accent); color: var(--accent); }

        /* ======= GRID ======= */
        .grid-wrapper {
            flex: 1;
            overflow: auto;
            padding: 12px;
        }

        .grid-container {
            display: grid;
            gap: 8px;
            height: 100%;
            transition: opacity 0.3s ease;
        }

        .grid-container.dimmed { opacity: 0.15; pointer-events: none; }

        .grid-item {
            background: var(--surface);
            border: 1.5px solid var(--border);
            border-radius: 8px;
            padding: 8px 10px;
            display: flex;
            flex-direction: column;
            cursor: default;
            overflow: hidden;
            position: relative;
            transition: border-color 0.15s, box-shadow 0.15s;
            min-height: 70px;
        }

        .grid-item:hover { border-color: var(--accent); box-shadow: 0 0 0 1px rgba(79,124,255,0.2); }

        .grid-item.shortcut-active {
            border-color: var(--success);
            box-shadow: 0 0 0 2px rgba(52,211,153,0.3);
        }

        .grid-item.dragging { opacity: 0.4; transform: scale(0.96); border-style: dashed; }

        .drag-handle {
            position: absolute;
            top: 5px;
            right: 6px;
            color: var(--border);
            font-size: 1rem;
            cursor: grab;
            user-select: none;
            z-index: 10;
            transition: color 0.15s;
        }
        .drag-handle:hover { color: var(--accent); }

        .item-meta {
            display: flex;
            align-items: center;
            gap: 5px;
            margin-bottom: 3px;
        }

        .item-num {
            font-size: 0.58rem;
            color: var(--text-muted);
        }

        .shortcut-badge {
            font-size: 0.58rem;
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 3px;
            padding: 1px 5px;
            color: var(--accent);
            font-weight: 700;
            letter-spacing: 0.05em;
        }

        .title-input {
            width: calc(100% - 22px);
            border: none;
            outline: none;
            font-size: 0.8rem;
            font-weight: 700;
            color: #93c5fd;
            background: transparent;
            margin-bottom: 4px;
            padding-bottom: 3px;
            border-bottom: 1px solid var(--border);
        }

        .title-input::placeholder { color: var(--border); }

        .content-textarea {
            width: 100%;
            flex: 1;
            border: none;
            resize: none;
            outline: none;
            font-size: 0.75rem;
            color: #9ca3af;
            background: transparent;
            line-height: 1.5;
        }

        .content-textarea::placeholder { color: #374151; }

        /* ======= OVERLAY ======= */
        #overlay-backdrop {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.6);
            display: none;
            z-index: 400;
            backdrop-filter: blur(2px);
        }

        #overlay {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 85%;
            height: 55%;
            background: var(--surface);
            border: 2px solid var(--accent);
            border-radius: 16px;
            padding: 28px 36px;
            box-shadow: 0 25px 60px rgba(0,0,0,0.7), 0 0 40px rgba(79,124,255,0.15);
            display: none;
            z-index: 500;
            overflow-y: auto;
            cursor: default;
        }

        #overlay-drag-handle {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 36px;
            cursor: move;
            z-index: 5;
            border-radius: 16px 16px 0 0;
        }

        #overlay-drag-handle::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 36px;
            height: 4px;
            background: var(--border);
            border-radius: 2px;
        }

        #overlay::-webkit-scrollbar { width: 8px; }
        #overlay::-webkit-scrollbar-track { background: var(--surface2); border-radius: 4px; }
        #overlay::-webkit-scrollbar-thumb { background: var(--accent); border-radius: 4px; }

        #overlay-title {
            font-size: 0.9rem;
            font-weight: 800;
            color: var(--accent);
            letter-spacing: 0.04em;
            margin-bottom: 16px;
            padding-bottom: 10px;
            border-bottom: 1px solid var(--border);
        }

        #overlay-text {
            font-weight: 700;
            color: var(--text);
            line-height: 1.6;
            white-space: pre-wrap;
            word-wrap: break-word;
            padding-bottom: 60px;
        }

        #edit-mode-btn {
            position: absolute;
            top: 14px;
            right: 50px;
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 6px;
            font-size: 0.85rem;
            width: 30px;
            height: 28px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.15s;
            z-index: 10;
            line-height: 1;
        }
        #edit-mode-btn:hover { border-color: var(--accent); }
        #edit-mode-btn.active {
            background: rgba(79,124,255,0.15);
            border-color: var(--accent);
        }

        #overlay-edit {
            display: none;
            width: 100%;
            flex: 1;
            border: 1px solid var(--border);
            border-radius: 8px;
            background: var(--surface2);
            color: var(--text);
            font-size: inherit;
            font-weight: 700;
            line-height: 1.6;
            padding: 12px 14px;
            resize: none;
            outline: none;
            box-sizing: border-box;
            margin-bottom: 8px;
            min-height: 120px;
        }
        #overlay-edit:focus { border-color: var(--accent); }

        #overlay-title-edit {
            display: none;
            width: 100%;
            border: 1px solid var(--border);
            border-radius: 6px;
            background: var(--surface2);
            color: var(--accent);
            font-size: 0.9rem;
            font-weight: 800;
            letter-spacing: 0.04em;
            padding: 6px 10px;
            outline: none;
            box-sizing: border-box;
            margin-bottom: 8px;
        }
        #overlay-title-edit:focus { border-color: var(--accent); }

        #overlay.edit-mode #overlay-title   { display: none; }
        #overlay.edit-mode #overlay-title-edit { display: block; }
        #overlay.edit-mode #overlay-text    { display: none; }
        #overlay.edit-mode #overlay-edit    { display: block; }
        #overlay.edit-mode #speech-bar      { display: none; }

        #speech-bar {
            position: sticky;
            bottom: 0;
            left: 0;
            right: 0;
            background: var(--surface);
            border-top: 1px solid var(--border);
            padding: 8px 0 4px;
            display: flex;
            align-items: center;
            gap: 6px;
            margin-top: 16px;
        }

        .speech-btn {
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 6px;
            color: var(--text);
            font-size: 0.85rem;
            width: 34px;
            height: 30px;
            cursor: pointer;
            transition: all 0.15s;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }
        .speech-btn:hover:not(:disabled) { border-color: var(--accent); color: var(--accent); }
        .speech-btn:disabled { opacity: 0.3; cursor: default; }
        .speech-btn#speech-play-btn.speaking { border-color: var(--success); color: var(--success); }

        #speech-status {
            flex: 1;
            font-size: 0.65rem;
            color: var(--text-muted);
            letter-spacing: 0.04em;
        }

        #speech-rate {
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 5px;
            color: var(--text);
            font-size: 0.68rem;
            padding: 2px 4px;
            cursor: pointer;
            outline: none;
        }

        #close-btn {
            position: absolute;
            top: 14px;
            right: 18px;
            font-size: 1.4rem;
            cursor: pointer;
            color: var(--text-muted);
            z-index: 600;
            line-height: 1;
            transition: color 0.15s;
        }
        #close-btn:hover { color: var(--danger); }

        /* ======= SHORTCUT TOAST ======= */
        #shortcut-toast {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: var(--surface);
            border: 1px solid var(--success);
            border-radius: 8px;
            padding: 8px 14px;
            font-size: 0.75rem;
            color: var(--success);
            font-weight: 600;
            z-index: 800;
            opacity: 0;
            transform: translateY(8px);
            transition: opacity 0.2s, transform 0.2s;
            pointer-events: none;
        }
        #shortcut-toast.show { opacity: 1; transform: translateY(0); }

        /* ======= SHORTCUT HINT BAR ======= */
        .hint-bar {
            background: var(--surface);
            border-top: 1px solid var(--border);
            padding: 4px 14px;
            display: flex;
            gap: 16px;
            flex-wrap: wrap;
            flex-shrink: 0;
        }

        .hint-item {
            display: flex;
            align-items: center;
            gap: 4px;
            font-size: 0.63rem;
            color: var(--text-muted);
        }

        kbd {
            display: inline-block;
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 3px;
            padding: 1px 5px;
            font-size: 0.62rem;
            color: var(--accent);
            font-family: monospace;
            font-weight: 700;
        }

        /* ======= SCENARIO COUNT BADGE ======= */
        .scenario-count {
            font-size: 0.62rem;
            background: rgba(79,124,255,0.15);
            border: 1px solid rgba(79,124,255,0.3);
            border-radius: 10px;
            padding: 1px 6px;
            color: var(--accent);
            margin-left: 2px;
        }
    

.modal-btn {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-size: 0.78rem;
    font-weight: 600;
    padding: 9px 8px;
    cursor: pointer;
    transition: all 0.15s;
}
.modal-btn:hover { border-color: var(--accent); color: var(--accent); background: rgba(79,124,255,0.08); }
.modal-btn-icon { font-size: 0.9rem; color: var(--accent); }


#timer-widget {
    position: fixed;
    bottom: 50px;
    right: 20px;
    width: 180px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.4);
    z-index: 700;
    overflow: hidden;
    user-select: none;
    transition: box-shadow 0.2s;
}
#timer-widget.minimized #timer-body { display: none; }
#timer-widget.minimized { width: auto; }
#timer-header {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 7px 10px;
    background: var(--surface2);
    border-bottom: 1px solid var(--border);
    cursor: move;
    font-size: 0.72rem;
    color: var(--text-muted);
}
#timer-drag-handle { font-size: 0.9rem; cursor: move; }
#timer-label { flex: 1; font-weight: 600; letter-spacing: 0.04em; }
#timer-minimize-btn {
    cursor: pointer;
    font-size: 1rem;
    line-height: 1;
    padding: 0 2px;
    transition: color 0.15s;
}
#timer-minimize-btn:hover { color: var(--accent); }
#timer-body { padding: 12px 10px 10px; }
#timer-display {
    font-size: 2.4rem;
    font-weight: 900;
    text-align: center;
    color: var(--text);
    letter-spacing: 0.04em;
    font-variant-numeric: tabular-nums;
    line-height: 1;
    margin-bottom: 10px;
    transition: color 0.3s;
}
#timer-display.warning { color: var(--warning); }
#timer-display.danger  { color: var(--danger); animation: blink 0.6s step-end infinite; }
#timer-display.done    { color: var(--danger); }
@keyframes blink {
    0%, 100% { opacity: 1; }
    50%       { opacity: 0.2; }
}
#timer-presets {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 4px;
    margin-bottom: 8px;
}
.t-preset {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 5px;
    color: var(--text-muted);
    font-size: 0.7rem;
    padding: 4px 2px;
    cursor: pointer;
    transition: all 0.15s;
}
.t-preset:hover    { border-color: var(--accent); color: var(--accent); }
.t-preset.selected { border-color: var(--accent); background: rgba(79,124,255,0.12); color: var(--accent); font-weight: 700; }
#timer-controls { display: flex; gap: 6px; }
#timer-start-btn {
    flex: 1;
    background: var(--accent);
    border: none;
    border-radius: 6px;
    color: white;
    font-size: 0.75rem;
    font-weight: 700;
    padding: 6px 4px;
    cursor: pointer;
    transition: opacity 0.15s;
    letter-spacing: 0.03em;
}
#timer-start-btn:hover { opacity: 0.85; }
#timer-start-btn.running { background: var(--warning); color: #1f2937; }
#timer-reset-btn {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text-muted);
    font-size: 1rem;
    width: 32px;
    cursor: pointer;
    transition: all 0.15s;
}
#timer-reset-btn:hover { border-color: var(--danger); color: var(--danger); }
#timer-flash {
    position: fixed;
    inset: 0;
    background: rgba(248,113,113,0.18);
    z-index: 900;
    pointer-events: none;
    opacity: 0;
}
#timer-flash.flash { animation: flashAnim 1.4s ease-out forwards; }
@keyframes flashAnim {
    0%   { opacity: 1; }
    100% { opacity: 0; }
}
</style>
</head>
<body>
<!-- TOP BAR -->
<div class="top-bar">
    <div class="app-logo">Qcard PRO</div>
    <div class="divider"></div>

    <div class="ctrl-group">
        <label>グリッド</label>
        <input type="number" id="rowsInput" min="1" max="10" value="4" class="num">
        <span style="color:var(--text-muted)">×</span>
        <input type="number" id="colsInput" min="1" max="10" value="4" class="num">
    </div>

    <div class="divider"></div>

    <div class="ctrl-group">
        <label>文字</label>
        <input type="range" id="fontSizeSlider" min="10" max="100" value="30">
        <input type="number" id="fontSizeNum" min="10" max="150" value="30" class="num">
        <span>px</span>
    </div>

    <div class="divider"></div>

    <div class="ctrl-group">
        <label>幅</label>
        <input type="range" id="widthSlider" min="20" max="98" value="85">
        <span class="val-badge" id="widthDisplay">85%</span>
    </div>

    <div class="ctrl-group">
        <label>高さ</label>
        <input type="range" id="heightSlider" min="20" max="95" value="55">
        <span class="val-badge" id="heightDisplay">55%</span>
    </div>

    <div class="divider"></div>
    <div class="theme-toggle" id="themeToggle" onclick="toggleTheme()">
        <span id="themeIcon">☀️</span>
        <span id="themeLabel">ライト</span>
    </div>
    <div class="top-btn danger" onclick="clearAll()">全消去</div>
    <div class="top-btn" onclick="openDataModal()">データ管理</div>
</div>

<!-- SCENARIO BAR -->
<div class="scenario-bar">
    <span class="scenario-bar-label">シナリオ</span>
    <div id="scenario-tabs"></div>
    <button class="scenario-add-btn" id="scenario-add-btn" onclick="addScenario()">＋ 追加</button>
</div>

<!-- GRID -->
<div class="grid-wrapper">
    <div class="grid-container" id="grid"></div>
</div>

<!-- HINT BAR -->
<div class="hint-bar">
    <div class="hint-item"><kbd>1</kbd>〜<kbd>9</kbd> <span>カード呼び出し</span></div>
    <div class="hint-item"><kbd>0</kbd> <span>閉じる</span></div>
    <div class="hint-item"><kbd>Esc</kbd> <span>閉じる</span></div>

</div>

<div id="overlay-backdrop" onclick="handleBackdropClick()"></div>

    <div id="overlay-drag-handle"></div>
    <span id="close-btn" onclick="hideOverlay()">×</span>

<div id="data-modal-backdrop" onclick="closeDataModal()" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.55);z-index:1000;backdrop-filter:blur(2px);"></div>

                JSON：全シナリオを完全保存（推奨）<br>
                CSV：表計算ソフトで編集可能
            </div>
        </div>

        <!-- インポート -->
        <div style="border-top:1px solid var(--border);padding-top:16px;">
            <div style="font-size:0.7rem;font-weight:700;color:var(--text-muted);letter-spacing:0.08em;text-transform:uppercase;margin-bottom:8px;">インポート</div>

                <button class="modal-btn" onclick="document.getElementById('importFileJSON').click()">
                    <span class="modal-btn-icon">{ }</span>
                    <span>JSON</span>

                    <span class="modal-btn-icon">⊞</span>
                    <span>CSV</span>
                </button>

            </div>
            <input type="file" id="importFileJSON" accept=".json" style="display:none" onchange="importJSON(event)">

    <div id="timer-header">
        <span id="timer-drag-handle">⠿</span>
        <span id="timer-label">タイマー</span>

    </div>

        <div id="timer-display">0:00</div>

            <button class="t-preset" data-secs="60" onclick="setTimer(60)">1分</button>
            <button class="t-preset" data-secs="120" onclick="setTimer(120)">2分</button>
            <button class="t-preset" data-secs="180" onclick="setTimer(180)">3分</button>
        </div>

            <button id="timer-start-btn" onclick="timerStartStop()">▶ スタート</button>
            <button id="timer-reset-btn" onclick="timerReset()">↺</button>
        </div>

<!-- TIMER FLASH OVERLAY -->
<div id="timer-flash"></div>
<script>
// ===== STATE =====
const grid        = document.getElementById('grid');
const backdrop    = document.getElementById('overlay-backdrop');
const overlay     = document.getElementById('overlay');
const overlayTitle = document.getElementById('overlay-title');
const overlayText  = document.getElementById('overlay-text');
const toast        = document.getElementById('shortcut-toast');

let currentFontSize = +localStorage.getItem('kp_font')   || 30;
let currentWidth    = +localStorage.getItem('kp_width')   || 85;
let currentHeight   = +localStorage.getItem('kp_height')  || 55;
let gridRows        = +localStorage.getItem('kp_rows')    || 4;
let gridCols        = +localStorage.getItem('kp_cols')    || 4;

let isLocked     = false;
let isEditMode   = false;
let editCardItem = null;
let hideTimeout  = null;
let dragSrcEl    = null;
let toastTimeout = null;

let scenarios        = [];
let activeScenarioId = null;

// ===== SCENARIOS =====
function loadScenarios() {
    try {
        const raw = localStorage.getItem('kp_scenarios_v1');
        if (raw) {
            const parsed = JSON.parse(raw);
            scenarios        = parsed.scenarios || [];
            activeScenarioId = parsed.activeId  || null;
        }
    } catch(e) {}

    if (scenarios.length === 0) {
        scenarios = [
            { id: uid(), name: 'シナリオ1', data: [] },
            { id: uid(), name: 'シナリオ2', data: [] },
            { id: uid(), name: 'シナリオ3', data: [] },
            { id: uid(), name: 'シナリオ4', data: [] },
        ];
        activeScenarioId = scenarios[0].id;
    }

    if (!scenarios.find(function(s){ return s.id === activeScenarioId; })) {
        activeScenarioId = scenarios[0] ? scenarios[0].id : null;
    }
}

function saveScenarios() {
    localStorage.setItem('kp_scenarios_v1', JSON.stringify({
        scenarios: scenarios,
        activeId:  activeScenarioId
    }));
}

function uid() {
    return crypto.randomUUID();
}

function getActive() {
    return scenarios.find(function(s){ return s.id === activeScenarioId; });
}

// ===== THEME =====
var isLight = localStorage.getItem('kp_theme') === 'light';

function applyTheme() {
    if (isLight) {
        document.documentElement.classList.add('light');
        document.getElementById('themeIcon').innerText  = '\uD83C\uDF19'; // 🌙
        document.getElementById('themeLabel').innerText = 'ダーク';
    } else {
        document.documentElement.classList.remove('light');
        document.getElementById('themeIcon').innerText  = '\u2600\uFE0F'; // ☀️
        document.getElementById('themeLabel').innerText = 'ライト';
    }
}

function toggleTheme() {
    isLight = !isLight;
    localStorage.setItem('kp_theme', isLight ? 'light' : 'dark');
    applyTheme();
}

// ===== INIT =====
(function init() {
    applyTheme();
    loadScenarios();

    document.getElementById('fontSizeSlider').value    = Math.min(currentFontSize, 100);
    document.getElementById('fontSizeNum').value       = currentFontSize;
    document.getElementById('widthSlider').value       = currentWidth;
    document.getElementById('widthDisplay').innerText  = currentWidth + '%';
    document.getElementById('heightSlider').value      = currentHeight;
    document.getElementById('heightDisplay').innerText = currentHeight + '%';
    overlay.style.width  = currentWidth + '%';
    overlay.style.height = currentHeight + '%';
    document.getElementById('rowsInput').value = gridRows;
    document.getElementById('colsInput').value = gridCols;

    renderScenarioTabs();
    updateGrid();
    bindControls();
    bindKeyboard();
})();

// ===== SCENARIO TABS =====
function renderScenarioTabs() {
    var container = document.getElementById('scenario-tabs');
    container.innerHTML = '';

    scenarios.forEach(function(s, idx) {
        var isActive = s.id === activeScenarioId;
        var tab = document.createElement('div');
        tab.className = 'scenario-tab' + (isActive ? ' active' : '');

        var key = document.createElement('span');
        key.className   = 'tab-key';
        key.innerText   = 'F' + (idx + 1);

        var name = document.createElement('input');
        name.className  = 'tab-name';
        name.type       = 'text';
        name.value      = s.name;
        name.maxLength  = 12;

        name.addEventListener('change', (function(scenario, index, input) {
            return function() {
                scenario.name = input.value.trim() || ('シナリオ' + (index + 1));
                input.value   = scenario.name;
                saveScenarios();
            };
        })(s, idx, name));

        name.addEventListener('click', function(e) {
            if (isActive) e.stopPropagation();
        });

        name.addEventListener('keydown', function(e) {
            if (e.key === 'Enter') name.blur();
            e.stopPropagation();
        });

        tab.appendChild(key);
        tab.appendChild(name);

        if (idx >= 4) {
            var del = document.createElement('button');
            del.className   = 'tab-delete';
            del.textContent = '\u00D7';
            del.title       = '削除';
            del.addEventListener('click', (function(sid) {
                return function(e) {
                    e.stopPropagation();
                    deleteScenario(sid);
                };
            })(s.id));
            tab.appendChild(del);
        }

        tab.addEventListener('click', (function(sid) {
            return function(e) {
                if (e.target.tagName === 'INPUT' && e.target.classList.contains('tab-name') && sid === activeScenarioId) return;
                switchScenario(sid);
            };
        })(s.id));

        container.appendChild(tab);
    });

    var addBtn = document.getElementById('scenario-add-btn');
    if (addBtn) addBtn.style.display = scenarios.length >= 8 ? 'none' : '';
}

function switchScenario(id) {
    saveCurrentGridData();
    activeScenarioId = id;
    saveScenarios();
    renderScenarioTabs();
    updateGrid();
    hideOverlay();
    var s = scenarios.find(function(sc){ return sc.id === id; });
    showToast('シナリオ: ' + (s ? s.name : ''));
}

function addScenario() {
    if (scenarios.length >= 8) { showToast('最大8シナリオまで'); return; }
    saveCurrentGridData();
    var s = { id: uid(), name: 'シナリオ' + (scenarios.length + 1), data: [] };
    scenarios.push(s);
    activeScenarioId = s.id;
    saveScenarios();
    renderScenarioTabs();
    updateGrid();
}

function deleteScenario(id) {
    if (scenarios.length <= 1) { showToast('最後のシナリオは削除不可'); return; }
    var target = scenarios.find(function(s){ return s.id === id; });
    if (!confirm((target ? target.name : '') + ' を削除しますか？')) return;
    scenarios = scenarios.filter(function(s){ return s.id !== id; });
    if (activeScenarioId === id) activeScenarioId = scenarios[0].id;
    saveScenarios();
    renderScenarioTabs();
    updateGrid();
}

function saveCurrentGridData() {
    var active = getActive();
    if (!active) return;
    active.data = getCurrentGridData();
    saveScenarios();
}

// ===== GRID =====
function updateGrid() {
    grid.style.gridTemplateRows    = 'repeat(' + gridRows + ', 1fr)';
    grid.style.gridTemplateColumns = 'repeat(' + gridCols + ', 1fr)';
    var active = getActive();
    renderGrid(active ? active.data : []);
}

function getCurrentGridData() {
    return Array.from(grid.querySelectorAll('.grid-item')).map(function(item) {
        return {
            title:   item.querySelector('.title-input').value,
            content: item.querySelector('.content-textarea').value,
        };
    });
}

function renderGrid(data) {
    grid.innerHTML = '';
    var total = gridRows * gridCols;
    for (var i = 0; i < total; i++) {
        var d = data[i] || { title: '', content: '' };
        grid.appendChild(createItem(i, d));
    }
}

function createItem(index, d) {
    var item = document.createElement('div');
    item.className  = 'grid-item';
    item.draggable  = true;
    item.dataset.index = index;

    var handle = document.createElement('div');
    handle.className = 'drag-handle';
    handle.innerHTML = '\u2725';

    var meta = document.createElement('div');
    meta.className = 'item-meta';

    var num = document.createElement('span');
    num.className = 'item-num';
    num.innerText = '#' + (index + 1);

    var badge = document.createElement('span');
    badge.className = 'shortcut-badge';
    if (index < 9) {
        badge.innerText = '[' + (index + 1) + ']';
    } else {
        badge.style.display = 'none';
    }

    meta.appendChild(num);
    meta.appendChild(badge);

    var titleInput = document.createElement('input');
    titleInput.className   = 'title-input';
    titleInput.placeholder = 'タイトル...';
    titleInput.value       = d.title;
    titleInput.addEventListener('mousedown', function(e){ e.stopPropagation(); });

    var contentTextarea = document.createElement('textarea');
    contentTextarea.className   = 'content-textarea';
    contentTextarea.placeholder = '内容...';
    contentTextarea.value       = d.content;
    contentTextarea.addEventListener('mousedown', function(e){ e.stopPropagation(); });

    item.addEventListener('mouseenter', (function(t, c, it) {
        return function() {
            if (isLocked) return;
            clearTimeout(hideTimeout);
            showOverlay(t.value, c.value, it);
        };
    })(titleInput, contentTextarea, item));

    item.addEventListener('mouseleave', function() {
        if (isLocked) return;
        hideTimeout = setTimeout(hideOverlay, 300);
    });

    item.addEventListener('click', (function(t, c) {
        return function(e) {
            if (e.target.tagName === 'TEXTAREA' || e.target.tagName === 'INPUT' || e.target.classList.contains('drag-handle')) return;
            if (c.value.trim() || t.value.trim()) {
                isLocked = true;
                showOverlay(t.value, c.value, item);
            }
        };
    })(titleInput, contentTextarea));

    [titleInput, contentTextarea].forEach(function(el) {
        el.addEventListener('input', saveCurrentGridData);
    });

    item.addEventListener('dragstart', handleDragStart);
    item.addEventListener('dragover',  handleDragOver);
    item.addEventListener('drop',      handleDrop);
    item.addEventListener('dragend',   handleDragEnd);

    item.appendChild(handle);
    item.appendChild(meta);
    item.appendChild(titleInput);
    item.appendChild(contentTextarea);
    return item;
}

// ===== OVERLAY =====
overlay.addEventListener('mouseenter', function(){ clearTimeout(hideTimeout); });
overlay.addEventListener('mouseleave', function(){ if (!isLocked) hideOverlay(); });

function showOverlay(title, text, cardItem) {
    if (!title.trim() && !text.trim()) return;
    exitEditMode();
    editCardItem = cardItem || null;
    overlayTitle.innerText = title;
    overlayTitle.style.display = title.trim() ? 'block' : 'none';
    overlayText.innerText  = text;
    overlayText.style.fontSize = currentFontSize + 'px';
    overlay.style.display  = 'block';
    // 初回表示時のみ中央にリセット
    if (!overlay.dataset.dragged) {
        overlay.style.transform = 'translate(-50%, -50%)';
        overlay.style.top  = '50%';
        overlay.style.left = '50%';
    }
    if (isLocked) {
        backdrop.style.display = 'block';
        grid.classList.add('dimmed');
    } else {
        backdrop.style.display = 'none';
        grid.classList.remove('dimmed');
    }
}

function hideOverlay() {
    exitEditMode();
    speechReset();
    overlay.style.display  = 'none';
    backdrop.style.display = 'none';
    grid.classList.remove('dimmed');
    isLocked = false;
    overlay.scrollTop = 0;
}

function handleBackdropClick() {
    if (isLocked) hideOverlay();
}

// ===== KEYBOARD =====
function bindKeyboard() {
    document.addEventListener('keydown', function(e) {
        var tag = document.activeElement ? document.activeElement.tagName : '';
        var isEditing = (tag === 'TEXTAREA' || tag === 'INPUT');

        if (e.key.match(/^F[1-8]$/) && !e.shiftKey && !e.ctrlKey && !e.altKey) {
            var n = parseInt(e.key.slice(1), 10);
            if (scenarios[n - 1]) {
                e.preventDefault();
                switchScenario(scenarios[n - 1].id);
            }
            return;
        }

        if (isEditing) return;

        // 編集モード中はショートカット無効（Escのみ編集終了）
        if (isEditMode) {
            if (e.key === 'Escape') { exitEditMode(); }
            return;
        }

        if (e.key >= '1' && e.key <= '9') {
            triggerCard(parseInt(e.key, 10) - 1);
            return;
        }
        if (e.key === '0' || e.key === 'Escape') { hideOverlay(); return; }
        if (e.key === 'ArrowUp')   { overlay.scrollBy(0, -60); return; }
        if (e.key === 'ArrowDown') { overlay.scrollBy(0,  60); return; }
    });
}

function triggerCard(idx) {
    var items = grid.querySelectorAll('.grid-item');
    if (!items[idx]) return;
    var item    = items[idx];
    var title   = item.querySelector('.title-input').value;
    var text    = item.querySelector('.content-textarea').value;
    if (!title.trim() && !text.trim()) return;
    item.classList.add('shortcut-active');
    setTimeout(function(){ item.classList.remove('shortcut-active'); }, 600);
    isLocked = true;
    showOverlay(title, text, item);
    showToast('カード ' + (idx + 1) + ' を表示');
}

// ===== TOAST =====
function showToast(msg) {
    clearTimeout(toastTimeout);
    toast.innerText = msg;
    toast.classList.add('show');
    toastTimeout = setTimeout(function(){ toast.classList.remove('show'); }, 1800);
}

// ===== DRAG =====
function handleDragStart(e) {
    this.classList.add('dragging');
    dragSrcEl = this;
    e.dataTransfer.effectAllowed = 'move';
}
function handleDragOver(e) { if (e.preventDefault) e.preventDefault(); return false; }
function handleDrop(e) {
    if (e.stopPropagation) e.stopPropagation();
    if (dragSrcEl !== this) {
        var data = getCurrentGridData();
        var from = parseInt(dragSrcEl.dataset.index, 10);
        var to   = parseInt(this.dataset.index, 10);
        var tmp  = data[from];
        data[from] = data[to];
        data[to]   = tmp;
        renderGrid(data);
        saveCurrentGridData();
    }
    return false;
}
function handleDragEnd() { this.classList.remove('dragging'); }

// ===== CONTROLS =====
function bindControls() {
    document.getElementById('fontSizeSlider').addEventListener('input', function(e){ updateFontSize(e.target.value); });
    document.getElementById('fontSizeNum').addEventListener('input',   function(e){ updateFontSize(e.target.value); });

    document.getElementById('widthSlider').addEventListener('input', function(e) {
        currentWidth = e.target.value;
        document.getElementById('widthDisplay').innerText = currentWidth + '%';
        overlay.style.width = currentWidth + '%';
        localStorage.setItem('kp_width', currentWidth);
    });

    document.getElementById('heightSlider').addEventListener('input', function(e) {
        currentHeight = e.target.value;
        document.getElementById('heightDisplay').innerText = currentHeight + '%';
        overlay.style.height = currentHeight + '%';
        localStorage.setItem('kp_height', currentHeight);
    });

    document.getElementById('rowsInput').addEventListener('change', onGridChange);
    document.getElementById('colsInput').addEventListener('change', onGridChange);
}

function updateFontSize(val) {
    currentFontSize = +val;
    document.getElementById('fontSizeSlider').value = Math.min(val, 100);
    document.getElementById('fontSizeNum').value    = val;
    overlayText.style.fontSize = val + 'px';
    localStorage.setItem('kp_font', val);
}

function onGridChange() {
    saveCurrentGridData();
    gridRows = parseInt(document.getElementById('rowsInput').value, 10) || 1;
    gridCols = parseInt(document.getElementById('colsInput').value, 10) || 1;
    localStorage.setItem('kp_rows', gridRows);
    localStorage.setItem('kp_cols', gridCols);
    updateGrid();
}

// ===== CLEAR =====
function clearAll() {
    var active = getActive();
    if (!confirm((active ? active.name : 'このシナリオ') + ' のメモを全て消去しますか？')) return;
    grid.querySelectorAll('.title-input, .content-textarea').forEach(function(el){ el.value = ''; });
    saveCurrentGridData();
    hideOverlay();
}

// ===== DATA MODAL =====
function openDataModal() {
    saveCurrentGridData();
    document.getElementById('data-modal-backdrop').style.display = 'block';
    document.getElementById('data-modal').style.display          = 'block';
}
function closeDataModal() {
    document.getElementById('data-modal-backdrop').style.display = 'none';
    document.getElementById('data-modal').style.display          = 'none';
}

function exportJSON() {
    var blob = new Blob(
        [JSON.stringify({ scenarios: scenarios, activeId: activeScenarioId }, null, 2)],
        { type: 'application/json' }
    );
    downloadBlob(blob, 'kampe_' + today() + '.json');
    showToast('JSONをエクスポート');
    closeDataModal();
}

function exportCSV() {
    var CRLF = '\r\n';
    var rows = [['scenario', 'title', 'content']];
    scenarios.forEach(function(s) {
        (s.data || []).forEach(function(card) {
            rows.push([
                csvEscape(s.name),
                csvEscape(card.title   || ''),
                csvEscape(card.content || ''),
            ]);
        });
    });
    var csv = rows.map(function(r){ return r.join(','); }).join(CRLF);
    var BOM = '\uFEFF';
    var blob = new Blob([BOM + csv], { type: 'text/csv;charset=utf-8' });
    downloadBlob(blob, 'kampe_' + today() + '.csv');
    showToast('CSVをエクスポート');
    closeDataModal();
}

function csvEscape(str) {
    var s = String(str).replace(/"/g, '""');
    return /[,"\r\n]/.test(s) ? '"' + s + '"' : s;
}

function importJSON(e) {
    var file = e.target.files[0];
    if (!file) return;
    readFile(file, function(text) {
        try {
            var parsed = JSON.parse(text);
            if (parsed.scenarios && Array.isArray(parsed.scenarios)) {
                scenarios        = parsed.scenarios;
                activeScenarioId = parsed.activeId || scenarios[0].id;
                saveScenarios();
                renderScenarioTabs();
                updateGrid();
                showToast('JSONをインポート');
                closeDataModal();
            } else {
                showToast('JSONの形式が不正です');
            }
        } catch(err) {
            showToast('JSON読み込み失敗');
        }
    });
    e.target.value = '';
}

function importCSV(e) {
    var file = e.target.files[0];
    if (!file) return;
    readFile(file, function(text) {
        try {
            var rows = parseCSV(text);
            if (rows.length < 2) { showToast('データがありません'); return; }

            var header = rows[0].map(function(h){ return h.toLowerCase().trim(); });
            var si = header.indexOf('scenario');
            var ti = header.indexOf('title');
            var ci = header.indexOf('content');
            if (si < 0 || ti < 0 || ci < 0) {
                showToast('ヘッダーが不正 (scenario,title,content)');
                return;
            }

            var map = {};
            rows.slice(1).forEach(function(row) {
                var name    = (row[si] || '').trim();
                var title   = (row[ti] || '').trim();
                var content = (row[ci] || '').trim();
                if (!name) return;
                if (!map[name]) map[name] = [];
                map[name].push({ title: title, content: content });
            });

            Object.keys(map).forEach(function(name) {
                var existing = scenarios.find(function(s){ return s.name === name; });
                if (existing) {
                    existing.data = map[name];
                } else if (scenarios.length < 8) {
                    scenarios.push({ id: uid(), name: name, data: map[name] });
                }
            });

            activeScenarioId = scenarios[0] ? scenarios[0].id : null;
            saveScenarios();
            renderScenarioTabs();
            updateGrid();
            showToast('CSVをインポート');
            closeDataModal();
        } catch(err) {
            showToast('CSV読み込み失敗');
        }
    });
    e.target.value = '';
}

function parseCSV(text) {
    var rows    = [];
    var row     = [];
    var field   = '';
    var inQuote = false;
    var src     = text.replace(/\r\n/g, '\n').replace(/\r/g, '\n');
    for (var i = 0; i < src.length; i++) {
        var c = src[i];
        if (inQuote) {
            if (c === '"' && src[i + 1] === '"') { field += '"'; i++; }
            else if (c === '"') { inQuote = false; }
            else { field += c; }
        } else {
            if      (c === '"')  { inQuote = true; }
            else if (c === ',')  { row.push(field); field = ''; }
            else if (c === '\n') { row.push(field); rows.push(row); row = []; field = ''; }
            else                 { field += c; }
        }
    }
    if (field || row.length) { row.push(field); rows.push(row); }
    return rows.filter(function(r){ return r.some(function(f){ return f.trim(); }); });
}

function readFile(file, cb) {
    var reader = new FileReader();
    reader.onload = function(ev){ cb(ev.target.result); };
    reader.readAsText(file, 'UTF-8');
}

function downloadBlob(blob, filename) {
    var a = document.createElement('a');
    a.href     = URL.createObjectURL(blob);
    a.download = filename;
    a.click();
    setTimeout(function(){ URL.revokeObjectURL(a.href); }, 1000);
}

function today() {
    return new Date().toISOString().slice(0, 10);
}

// ===== TIMER =====
var timerTotal    = 60;
var timerLeft     = 0;
var timerRunning  = false;
var timerInterval = null;

var timerDisplay  = document.getElementById('timer-display');
var timerStartBtn = document.getElementById('timer-start-btn');
var timerFlash    = document.getElementById('timer-flash');

function setTimer(secs) {
    timerReset();
    timerTotal = secs;
    timerLeft  = secs;
    updateTimerDisplay();
    document.querySelectorAll('.t-preset').forEach(function(b) {
        var val = parseInt(b.getAttribute('data-secs'), 10);
        b.classList.toggle('selected', val === secs);
    });
}

function timerStartStop() {
    if (timerLeft <= 0) { timerReset(); return; }
    timerRunning = !timerRunning;
    if (timerRunning) {
        timerStartBtn.textContent = '\u23F8 一時停止';
        timerStartBtn.classList.add('running');
        timerInterval = setInterval(timerTick, 1000);
    } else {
        clearInterval(timerInterval);
        timerStartBtn.textContent = '\u25B6 スタート';
        timerStartBtn.classList.remove('running');
    }
}

function timerTick() {
    timerLeft--;
    updateTimerDisplay();
    if (timerLeft <= 0) {
        clearInterval(timerInterval);
        timerRunning = false;
        timerStartBtn.textContent = '\u25B6 スタート';
        timerStartBtn.classList.remove('running');
        timerDisplay.className = 'done';
        doFlash();
    }
}

function timerReset() {
    clearInterval(timerInterval);
    timerRunning  = false;
    timerLeft     = timerTotal;
    timerStartBtn.textContent = '\u25B6 スタート';
    timerStartBtn.classList.remove('running');
    timerDisplay.className = '';
    updateTimerDisplay();
}

function updateTimerDisplay() {
    var m = Math.floor(timerLeft / 60);
    var s = timerLeft % 60;
    timerDisplay.textContent = m + ':' + (s < 10 ? '0' : '') + s;
    var ratio = timerTotal > 0 ? timerLeft / timerTotal : 1;
    if (timerLeft <= 0) {
        timerDisplay.className = 'done';
    } else if (ratio <= 0.15 || timerLeft <= 10) {
        timerDisplay.className = 'danger';
    } else if (ratio <= 0.3) {
        timerDisplay.className = 'warning';
    } else {
        timerDisplay.className = '';
    }
}

function doFlash() {
    timerFlash.classList.remove('flash');
    void timerFlash.offsetWidth;
    timerFlash.classList.add('flash');
    setTimeout(function(){ timerFlash.classList.remove('flash'); }, 1500);
}

function toggleTimerMinimize() {
    var widget = document.getElementById('timer-widget');
    var btn    = document.getElementById('timer-minimize-btn');
    var minimized = widget.classList.toggle('minimized');
    btn.textContent = minimized ? '+' : '\u2212';
}

// タイマードラッグ
(function initTimerDrag() {
    var widget   = document.getElementById('timer-widget');
    var header   = document.getElementById('timer-header');
    var ox = 0, oy = 0, startX = 0, startY = 0, dragging = false;

    header.addEventListener('mousedown', function(e) {
        if (e.target.id === 'timer-minimize-btn') return;
        dragging = true;
        var rect = widget.getBoundingClientRect();
        startX = e.clientX; startY = e.clientY;
        ox = rect.left;     oy = rect.top;
        widget.style.right  = 'auto';
        widget.style.bottom = 'auto';
        widget.style.left   = ox + 'px';
        widget.style.top    = oy + 'px';
        e.preventDefault();
    });

    document.addEventListener('mousemove', function(e) {
        if (!dragging) return;
        widget.style.left = (ox + e.clientX - startX) + 'px';
        widget.style.top  = (oy + e.clientY - startY) + 'px';
    });

    document.addEventListener('mouseup', function() { dragging = false; });
})();

// ===== EDIT MODE =====
function toggleEditMode() {
    if (isEditMode) {
        exitEditMode();
    } else {
        enterEditMode();
    }
}

function enterEditMode() {
    if (!editCardItem) return;
    isEditMode = true;
    var titleInput   = document.getElementById('overlay-title-edit');
    var editTextarea = document.getElementById('overlay-edit');
    var btn          = document.getElementById('edit-mode-btn');

    // タイトル欄
    var titleTA = editCardItem.querySelector('.title-input');
    titleInput.value = titleTA ? titleTA.value : overlayTitle.innerText;
    titleInput.oninput = function() {
        if (!editCardItem) return;
        var t = editCardItem.querySelector('.title-input');
        if (t) {
            t.value = titleInput.value;
            overlayTitle.innerText = titleInput.value;
            overlayTitle.style.display = titleInput.value.trim() ? 'block' : 'none';
            saveCurrentGridData();
        }
    };

    // 本文欄
    var contentTA = editCardItem.querySelector('.content-textarea');
    editTextarea.value = contentTA ? contentTA.value : overlayText.innerText;
    editTextarea.style.fontSize = currentFontSize + 'px';
    editTextarea.oninput = function() {
        if (!editCardItem) return;
        var c = editCardItem.querySelector('.content-textarea');
        if (c) {
            c.value = editTextarea.value;
            overlayText.innerText = editTextarea.value;
            saveCurrentGridData();
        }
    };

    overlay.classList.add('edit-mode');
    btn.classList.add('active');
    btn.title = '表示モードに戻る (Esc)';
    setTimeout(function(){ titleInput.focus(); }, 50);
}

function exitEditMode() {
    if (!isEditMode) return;
    isEditMode = false;
    var titleInput   = document.getElementById('overlay-title-edit');
    var editTextarea = document.getElementById('overlay-edit');
    var btn          = document.getElementById('edit-mode-btn');
    if (titleInput)   titleInput.oninput   = null;
    if (editTextarea) editTextarea.oninput = null;
    overlay.classList.remove('edit-mode');
    if (btn) {
        btn.classList.remove('active');
        btn.title = '編集モード';
    }
}

// ===== SPEECH =====
var speechUtterance = null;
var speechState     = 'stopped'; // 'stopped' | 'playing' | 'paused'
var speechText      = '';
var speechRate      = 1.0;

function speechGetElements() {
    return {
        playBtn:  document.getElementById('speech-play-btn'),
        pauseBtn: document.getElementById('speech-pause-btn'),
        stopBtn:  document.getElementById('speech-stop-btn'),
        status:   document.getElementById('speech-status'),
    };
}

function speechUpdateUI() {
    var el = speechGetElements();
    if (!el.playBtn) return;
    if (speechState === 'playing') {
        el.playBtn.classList.add('speaking');
        el.playBtn.disabled  = true;
        el.pauseBtn.disabled = false;
        el.stopBtn.disabled  = false;
        el.status.innerText  = '読み上げ中...';
    } else if (speechState === 'paused') {
        el.playBtn.classList.remove('speaking');
        el.playBtn.disabled  = false;
        el.pauseBtn.disabled = true;
        el.stopBtn.disabled  = false;
        el.status.innerText  = '一時停止中';
    } else {
        el.playBtn.classList.remove('speaking');
        el.playBtn.disabled  = false;
        el.pauseBtn.disabled = true;
        el.stopBtn.disabled  = true;
        el.status.innerText  = '';
    }
}

function speechPlay() {
    if (!('speechSynthesis' in window)) {
        alert('このブラウザはWeb Speech APIに対応していません');
        return;
    }
    if (speechState === 'paused') {
        window.speechSynthesis.resume();
        speechState = 'playing';
        speechUpdateUI();
        return;
    }
    // 停止状態から再生（常に最初から）
    speechStop();
    var title   = document.getElementById('overlay-title').innerText;
    var text    = document.getElementById('overlay-text').innerText;
    speechText  = (title ? title + '。' : '') + text;
    if (!speechText.trim()) return;

    speechUtterance          = new SpeechSynthesisUtterance(speechText);
    speechUtterance.lang     = 'ja-JP';
    speechUtterance.rate     = speechRate;
    speechUtterance.pitch    = 1.0;

    speechUtterance.onstart  = function() { speechState = 'playing';  speechUpdateUI(); };
    speechUtterance.onend    = function() { speechState = 'stopped';  speechUpdateUI(); };
    speechUtterance.onerror  = function() { speechState = 'stopped';  speechUpdateUI(); };
    speechUtterance.onpause  = function() { speechState = 'paused';   speechUpdateUI(); };
    speechUtterance.onresume = function() { speechState = 'playing';  speechUpdateUI(); };

    window.speechSynthesis.speak(speechUtterance);
}

function speechPause() {
    if (speechState !== 'playing') return;
    window.speechSynthesis.pause();
    speechState = 'paused';
    speechUpdateUI();
}

function speechStop() {
    window.speechSynthesis.cancel();
    speechUtterance = null;
    speechState     = 'stopped';
    speechUpdateUI();
}

function speechUpdateRate() {
    var sel = document.getElementById('speech-rate');
    if (sel) speechRate = parseFloat(sel.value);
}

function speechReset() {
    speechStop();
    var el = speechGetElements();
    if (el.status) el.status.innerText = '';
}

// ===== OVERLAY DRAG =====
(function initOverlayDrag() {
    var handle   = document.getElementById('overlay-drag-handle');
    var ox = 0, oy = 0, startX = 0, startY = 0, dragging = false;

    handle.addEventListener('mousedown', function(e) {
        // transform を解除して実px座標に変換
        var rect = overlay.getBoundingClientRect();
        overlay.style.transform = 'none';
        overlay.style.left = rect.left + 'px';
        overlay.style.top  = rect.top  + 'px';
        overlay.dataset.dragged = '1';

        ox = rect.left; oy = rect.top;
        startX = e.clientX; startY = e.clientY;
        dragging = true;
        e.preventDefault();
    });

    document.addEventListener('mousemove', function(e) {
        if (!dragging) return;
        var nx = ox + e.clientX - startX;
        var ny = oy + e.clientY - startY;
        // 画面外に出ないよう制限
        nx = Math.max(0, Math.min(window.innerWidth  - overlay.offsetWidth,  nx));
        ny = Math.max(0, Math.min(window.innerHeight - overlay.offsetHeight, ny));
        overlay.style.left = nx + 'px';
        overlay.style.top  = ny + 'px';
    });

    document.addEventListener('mouseup', function() { dragging = false; });
})();
