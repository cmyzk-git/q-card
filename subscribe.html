<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>プランを選択 — Qcard PRO</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: #080c14;
  color: #d8e4f8;
  font-family: 'Noto Sans JP', sans-serif;
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
}
.card {
  background: #0e1525;
  border: 1px solid #1f2e4a;
  border-radius: 16px;
  padding: 40px 36px;
  width: 100%;
  max-width: 420px;
  box-shadow: 0 24px 80px rgba(0,0,0,0.6);
  text-align: center;
}
.logo {
  font-family: 'Syne', sans-serif;
  font-size: 1.4rem;
  font-weight: 800;
  background: linear-gradient(135deg, #3d8bff, #6c63ff);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  margin-bottom: 8px;
}
.subtitle {
  font-size: 0.8rem;
  color: #5a7299;
  margin-bottom: 32px;
}
.plan {
  background: #141d30;
  border: 1px solid #2a3d60;
  border-radius: 12px;
  padding: 24px;
  margin-bottom: 24px;
}
.plan-name {
  font-size: 0.72rem;
  color: #5a7299;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  margin-bottom: 8px;
}
.plan-price {
  font-size: 2.4rem;
  font-weight: 700;
  color: #d8e4f8;
  margin-bottom: 4px;
}
.plan-price span {
  font-size: 0.9rem;
  color: #5a7299;
}
.features {
  list-style: none;
  margin: 16px 0;
  text-align: left;
}
.features li {
  font-size: 0.8rem;
  color: #5a7299;
  padding: 6px 0;
  border-bottom: 1px solid #1f2e4a;
  display: flex;
  align-items: center;
  gap: 8px;
}
.features li::before {
  content: '✓';
  color: #2dd4a4;
  font-weight: 700;
}
.btn {
  width: 100%;
  background: #3d8bff;
  border: none;
  border-radius: 8px;
  color: white;
  padding: 14px;
  font-size: 0.95rem;
  font-weight: 700;
  cursor: pointer;
  transition: opacity 0.15s;
}
.btn:hover { opacity: 0.85; }
.logout {
  margin-top: 16px;
  font-size: 0.72rem;
  color: #3d5278;
  cursor: pointer;
  text-decoration: underline;
}
.message {
  font-size: 0.75rem;
  margin-top: 12px;
  min-height: 20px;
  color: #f2526a;
}
</style>
</head>
<body>
<div class="card">
  <div class="logo">Qcard PRO</div>
  <div class="subtitle">プランを選択してください</div>
  <div class="plan">
    <div class="plan-name">MONTHLY PLAN</div>
    <div class="plan-price">¥980<span>/月</span></div>
    <ul class="features">
      <li>全機能アクセス</li>
      <li>複数シナリオ管理</li>
      <li>データのエクスポート</li>
      <li>タイマー・音声読み上げ</li>
    </ul>
  </div>
  <button class="btn" onclick="startCheckout()">今すぐ始める</button>
  <div class="message" id="message"></div>
  <div class="logout" onclick="logout()">ログアウト</div>
</div>

<script type="module">
import { createClient } from 'https://esm.sh/@supabase/supabase-js@2'

const supabase = createClient(
  'https://jysidnrpuaixcorryjbo.supabase.co',
  'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imp5c2lkbnJwdWFpeGNvcnJ5amJvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODEwMzU2OTksImV4cCI6MjA5NjYxMTY5OX0.ESlYEXiakEicTdWpwOh0q4UYVefRzWrjo_HGjxjwjGw'
)

const { data: { session } } = await supabase.auth.getSession()
if (!session) { window.location.href = '/login.html' }

// 既にサブスク済みならapp.htmlへ
const { data: sub } = await supabase
  .from('subscribers')
  .select('stripe_subscription_status')
  .eq('user_id', session.user.id)
  .maybeSingle()

if (sub && sub.stripe_subscription_status === 'active') {
  window.location.href = 'https://q-card-woad.vercel.app/app.html'
}

window.startCheckout = async function() {
  const msg = document.getElementById('message')
  msg.textContent = '処理中...'
  try {
    const res = await fetch('/api/create-checkout-session', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ user_id: session.user.id, email: session.user.email })
    })
    const data = await res.json()
    if (data.url) { window.location.href = data.url }
    else { msg.textContent = 'エラーが発生しました。' }
  } catch(e) {
    msg.textContent = 'エラーが発生しました。'
  }
}

window.logout = async function() {
  await supabase.auth.signOut()
  window.location.href = '/login.html'
}
</script>
</body>
</html>
